# EKS manages the control plane — these components are not reachable
# from worker nodes and must be disabled to avoid scrape errors.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

grafana:
  adminPassword: admin
  deploymentStrategy:
    type: Recreate
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/group.name: bookgate
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      external-dns.alpha.kubernetes.io/hostname: grafana.canhnq.online
    hosts:
      - grafana.canhnq.online
    path: /
    pathType: Prefix
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-stack.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  dashboards:
    default:
      k8s-views-global:
        gnetId: 15760
        revision: 37
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15757
        revision: 43
        datasource: Prometheus
      k8s-views-workloads:
        gnetId: 15758
        revision: 41
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15759
        revision: 35
        datasource: Prometheus
      eks-resource-overview:
        json: |
          {
            "uid": "bookgate-eks-resource-overview",
            "title": "Bookgate EKS / Resource Overview",
            "tags": ["bookgate", "eks", "kubernetes"],
            "timezone": "browser",
            "schemaVersion": 39,
            "version": 1,
            "refresh": "30s",
            "time": {
              "from": "now-1h",
              "to": "now"
            },
            "templating": {
              "list": [
                {
                  "name": "namespace",
                  "type": "query",
                  "datasource": "Prometheus",
                  "query": "label_values(kube_pod_info, namespace)",
                  "refresh": 1,
                  "includeAll": true,
                  "multi": true,
                  "current": {
                    "selected": true,
                    "text": "bookgate",
                    "value": "bookgate"
                  }
                }
              ]
            },
            "panels": [
              {
                "id": 1,
                "type": "stat",
                "title": "Cluster CPU Used",
                "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
                "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "expr": "100 * sum(rate(container_cpu_usage_seconds_total{container!=\"\",image!=\"\"}[5m])) / sum(kube_node_status_allocatable{resource=\"cpu\"})"
                  }
                ]
              },
              {
                "id": 2,
                "type": "stat",
                "title": "Cluster Memory Used",
                "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
                "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "expr": "100 * sum(container_memory_working_set_bytes{container!=\"\",image!=\"\"}) / sum(kube_node_status_allocatable{resource=\"memory\"})"
                  }
                ]
              },
              {
                "id": 3,
                "type": "stat",
                "title": "Ready Nodes",
                "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
                "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})"
                  }
                ]
              },
              {
                "id": 4,
                "type": "stat",
                "title": "Running Pods",
                "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
                "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "expr": "sum(kube_pod_status_phase{phase=\"Running\"})"
                  }
                ]
              },
              {
                "id": 5,
                "type": "timeseries",
                "title": "CPU Usage By Namespace",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
                "fieldConfig": {"defaults": {"unit": "cores", "decimals": 2}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "legendFormat": "{{namespace}}",
                    "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\",container!=\"\",image!=\"\"}[5m]))"
                  }
                ]
              },
              {
                "id": 6,
                "type": "timeseries",
                "title": "Memory Usage By Namespace",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
                "fieldConfig": {"defaults": {"unit": "bytes", "decimals": 1}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "legendFormat": "{{namespace}}",
                    "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"$namespace\",container!=\"\",image!=\"\"})"
                  }
                ]
              },
              {
                "id": 7,
                "type": "bargauge",
                "title": "Running Pods By Namespace",
                "gridPos": {"h": 8, "w": 8, "x": 0, "y": 12},
                "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "legendFormat": "{{namespace}}",
                    "expr": "sum by (namespace) (kube_pod_status_phase{namespace=~\"$namespace\",phase=\"Running\"})"
                  }
                ]
              },
              {
                "id": 8,
                "type": "timeseries",
                "title": "Pod Restarts By Namespace",
                "gridPos": {"h": 8, "w": 8, "x": 8, "y": 12},
                "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "legendFormat": "{{namespace}}",
                    "expr": "sum by (namespace) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[30m]))"
                  }
                ]
              },
              {
                "id": 9,
                "type": "timeseries",
                "title": "Node CPU Used",
                "gridPos": {"h": 8, "w": 8, "x": 16, "y": 12},
                "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "legendFormat": "{{instance}}",
                    "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)"
                  }
                ]
              },
              {
                "id": 10,
                "type": "timeseries",
                "title": "Node Memory Used",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
                "fieldConfig": {"defaults": {"unit": "percent", "decimals": 1}},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "legendFormat": "{{instance}}",
                    "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))"
                  }
                ]
              },
              {
                "id": 11,
                "type": "table",
                "title": "Bookgate Pods",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
                "targets": [
                  {
                    "datasource": "Prometheus",
                    "format": "table",
                    "instant": true,
                    "expr": "kube_pod_info{namespace=\"bookgate\"}"
                  }
                ]
              }
            ]
          }

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 2Gi

prometheusOperator:
  tls:
    enabled: false
  admissionWebhooks:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
