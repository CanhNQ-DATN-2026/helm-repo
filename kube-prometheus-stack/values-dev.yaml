# EKS manages the control plane — these components are not reachable
# from worker nodes and must be disabled to avoid scrape errors.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

grafana:
  adminPassword: admin
  deploymentStrategy:
    type: Recreate
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/group.name: bookgate
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      external-dns.alpha.kubernetes.io/hostname: grafana.canhnq.online
    hosts:
      - grafana.canhnq.online
    path: /
    pathType: Prefix
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-stack.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  dashboards:
    default:
      k8s-views-global:
        gnetId: 15760
        revision: 37
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15757
        revision: 43
        datasource: Prometheus
      k8s-views-workloads:
        gnetId: 15758
        revision: 41
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15759
        revision: 35
        datasource: Prometheus

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 2Gi

prometheusOperator:
  admissionWebhooks:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
