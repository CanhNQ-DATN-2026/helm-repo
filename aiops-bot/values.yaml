# values.yaml — aiops-bot live configuration

# ── Image registry (ECR) ─────────────────────────────────────────────────────
ecr:
  registry: "392423995152.dkr.ecr.us-east-1.amazonaws.com"

# ── AIOps Bot ────────────────────────────────────────────────────────────────
image:
  repository: bookgate/aiops-bot
  tag: "667a290"
  pullPolicy: Always

replicas: 1
port: 8080

serviceAccount:
  name: "aiops-bot"
  roleArn: "arn:aws:iam::392423995152:role/bookgate-eks-aiops-bot-role"

# ── Bedrock ───────────────────────────────────────────────────────────────────
bedrock:
  roleArn: "arn:aws:iam::400071840696:role/bot-assume-role"
  region: "us-east-1"

claude:
  models:
    default: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    health: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    troubleshoot: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    change: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    explain: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    unknown: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
  outputTokenLimit: 1200

telegram:
  allowlist:
    enabled: true
    userIds:
      - "6855542290"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Secrets ──────────────────────────────────────────────────────────────────
# Only Telegram credentials are stored here; Bedrock access is via IRSA.
# Choose between manual secret or External Secrets Operator
externalSecrets:
  enabled: true
  # Name of the ClusterSecretStore configured at cluster level
  clusterSecretStoreName: "aws-secretsmanager"
  # AWS Secrets Manager secret name
  remoteSecretName: "bookgate/dev/aiops-bot-secrets"
  # How often ESO re-syncs
  refreshInterval: "1h"

# Name of the K8s Secret (created manually or by ESO)
existingSecret: "aiops-bot-secret"

# Namespace where the bot will be deployed
namespace: "bookgate"
