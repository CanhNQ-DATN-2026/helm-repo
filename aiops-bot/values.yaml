# values.yaml — base defaults for aiops-bot

# ── Image registry (ECR) ─────────────────────────────────────────────────────
ecr:
  registry: "ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com"

# ── AIOps Bot ────────────────────────────────────────────────────────────────
image:
  repository: bookgate/aiops-bot
  tag: "latest"
  pullPolicy: Always

replicas: 1
port: 8080

serviceAccount:
  name: "aiops-bot"
  roleArn: ""  # Terraform output: aiops_bot_role_arn

# ── Bedrock ───────────────────────────────────────────────────────────────────
bedrock:
  roleArn: ""   # ARN of the role in Account B that has Bedrock access
  region: "us-east-1"

claude:
  outputTokenLimit: 1200

telegram:
  allowlist:
    enabled: true
    chatIds: []
    userIds: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Secrets ──────────────────────────────────────────────────────────────────
# Only Telegram credentials are stored here; Bedrock access is via IRSA.
# Choose between manual secret or External Secrets Operator
externalSecrets:
  enabled: false
  # Name of the ClusterSecretStore configured at cluster level
  clusterSecretStoreName: "aws-secretsmanager"
  # AWS Secrets Manager secret name
  remoteSecretName: "bookgate/dev/aiops-bot-secrets"
  # How often ESO re-syncs
  refreshInterval: "1h"

# Name of the K8s Secret (created manually or by ESO)
existingSecret: "aiops-bot-secret"

# Namespace where the bot will be deployed
namespace: "bookgate"
