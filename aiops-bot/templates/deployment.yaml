apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aiops-bot.name" . }}
  namespace: {{ include "aiops-bot.namespace" . }}
  labels:
    {{- include "aiops-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "aiops-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aiops-bot.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: aiops-bot
          image: {{ include "aiops-bot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: CLAUDE_CODE_USE_BEDROCK
              value: "1"
            - name: AWS_BEDROCK_ROLE_ARN
              value: {{ .Values.bedrock.roleArn | quote }}
            - name: AWS_BEDROCK_REGION
              value: {{ .Values.bedrock.region | quote }}
            - name: CLAUDE_OUTPUT_TOKEN_LIMIT
              value: {{ .Values.claude.outputTokenLimit | quote }}
            - name: TELEGRAM_ALLOWLIST_PATH
              value: "/app/config/telegram-allowlist.txt"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: telegram_bot_token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: telegram_chat_id
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.telegram.allowlist.enabled }}
          volumeMounts:
            - name: telegram-allowlist
              mountPath: /app/config/telegram-allowlist.txt
              subPath: telegram-allowlist.txt
              readOnly: true
          {{- end }}
      {{- if .Values.telegram.allowlist.enabled }}
      volumes:
        - name: telegram-allowlist
          configMap:
            name: {{ include "aiops-bot.name" . }}-telegram-allowlist
      {{- end }}
