{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "aiops-bot.name" . }}-secret
  namespace: {{ include "aiops-bot.namespace" . }}
  labels:
    {{- include "aiops-bot.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.existingSecret }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: telegram_bot_token
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretName }}
        property: telegram_bot_token
    - secretKey: telegram_chat_id
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretName }}
        property: telegram_chat_id
{{- end }}
