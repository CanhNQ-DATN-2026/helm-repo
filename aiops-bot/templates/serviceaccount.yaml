apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ include "aiops-bot.namespace" . }}
  labels:
    {{- include "aiops-bot.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aiops-bot.name" . }}-reader
  labels:
    {{- include "aiops-bot.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, events, nodes, namespaces, services]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aiops-bot.name" . }}-reader
  labels:
    {{- include "aiops-bot.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ include "aiops-bot.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "aiops-bot.name" . }}-reader
  apiGroup: rbac.authorization.k8s.io
