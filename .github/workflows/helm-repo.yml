name: Helm Repo

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: helm-repo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Helm CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: |
          helm lint bookgate/
          helm lint aiops-bot/

      - name: Render Helm Templates
        run: |
          set -euo pipefail

          helm template bookgate bookgate/ \
            --set ecr.registry=392423995152.dkr.ecr.us-east-1.amazonaws.com \
            --set apiService.image.tag=test1234 \
            --set chatService.image.tag=test1234 \
            --set frontend.image.tag=test1234 \
            --set apiService.serviceAccount.roleArn=arn:aws:iam::392423995152:role/bookgate-eks-backend-role \
            --set apiService.env.s3BucketName=bookgate-dev-books-392423995152 \
            --set externalSecrets.remoteSecretName=bookgate/dev/app-secrets \
            --set ingress.host=bookgate.example.com \
            > /tmp/bookgate-rendered.yaml

          helm template aiops-bot aiops-bot/ \
            --set ecr.registry=392423995152.dkr.ecr.us-east-1.amazonaws.com \
            --set image.tag=test1234 \
            --set serviceAccount.roleArn=arn:aws:iam::392423995152:role/bookgate-eks-aiops-bot-role \
            --set bedrock.roleArn=arn:aws:iam::400071840696:role/bot-assume-role \
            --set externalSecrets.remoteSecretName=bookgate/dev/aiops-bot-secrets \
            > /tmp/aiops-bot-rendered.yaml

      - name: Verify Rendered Output Is Not Empty
        run: |
          test -s /tmp/bookgate-rendered.yaml
          test -s /tmp/aiops-bot-rendered.yaml
