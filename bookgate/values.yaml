    repository: registry.k8s.io/external-dns/external-dns
    tag: v0.18.0
    pullPolicy: IfNotPresent
  serviceAccount:
    name: external-dns
    roleArn: arn:aws:iam::392423995152:role/bookgate-eks-external-dns-role
  provider: aws
  policy: sync
  domainFilters:
  - canhnq.online
  txtOwnerId: bookgate-eks
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
