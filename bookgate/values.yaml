# values.yaml — production defaults for EKS deployment.

# ── Image registry (ECR) ─────────────────────────────────────────────────────
# Terraform output: ecr_registry_url
ecr:
  registry: "ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com"

# ── Service images — update tags manually on each release ────────────────────
apiService:
  image:
    repository: bookgate/api-service
    tag: "f8b132e"
    pullPolicy: Always
  replicas: 2
  port: 8000
  serviceAccount:
    name: "backend-sa"
    roleArn: ""  # Terraform output: backend_role_arn
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    corsOrigins: "https://bookgate.example.com"
    awsDefaultRegion: "ap-southeast-1"
    s3BucketName: "SET_S3_BUCKET_NAME"  # Terraform output: s3_bucket_name
    adminEmail: "admin@bookgate.com"
    adminFullName: "System Admin"

chatService:
  image:
    repository: bookgate/chat-service
    tag: "f8b132e"
    pullPolicy: Always
  replicas: 1
  port: 8001
  resources:
    requests:
      cpu: 125m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    corsOrigins: "https://bookgate.example.com"

frontend:
  image:
    repository: bookgate/frontend
    tag: "999117f"
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Secrets — External Secrets Operator ──────────────────────────────────────
# ESO reads the ExternalSecret below and creates bookgate-secret in this namespace.
# The Helm release assumes bookgate-secret already exists (ESO has synced it)
# before app pods start. Migration must also be run after sync is confirmed.
#
# Terraform creates the SM secret shell; the operator populates it once:
#   aws secretsmanager put-secret-value \
#     --secret-id bookgate/dev/app-secrets \
#     --secret-string '{"DATABASE_URL":"...","SECRET_KEY":"...","ADMIN_PASSWORD":"...","OPENAI_API_KEY":"..."}'
externalSecrets:
  # Name of the ClusterSecretStore configured at cluster level (not by this chart).
  clusterSecretStoreName: "aws-secretsmanager"
  # SM secret name — matches Terraform: "${project_name}/${environment}/app-secrets"
  # Change to "bookgate/prod/app-secrets" for production environment.
  remoteSecretName: "bookgate/dev/app-secrets"
  # How often ESO re-syncs.
  refreshInterval: "1h"

# Name of the K8s Secret that ESO creates. Referenced by all deployments.
existingSecret: "bookgate-secret"

# ── Ingress (AWS Load Balancer Controller) ────────────────────────────────────
ingress:
  # Leave empty to expose the app directly through the ALB DNS name without any domain.
  host: ""
  scheme: "internet-facing"
  idleTimeoutSeconds: 300
  certificateArn: ""
  groupName: "bookgate"
