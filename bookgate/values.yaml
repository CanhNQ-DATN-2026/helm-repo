# values.yaml — live configuration managed by Argo CD.

ecr:
  registry: 392423995152.dkr.ecr.us-east-1.amazonaws.com
apiService:
  image:
    repository: bookgate/api-service
    tag: 0faacc2
    pullPolicy: Always
  replicas: 1
  port: 8000
  serviceAccount:
    name: backend-sa
    roleArn: arn:aws:iam::392423995152:role/bookgate-eks-backend-role
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 100m
      memory: 512Mi
  env:
    corsOrigins: http://bookgate.canhnq.online
    awsDefaultRegion: us-east-1
    s3BucketName: bookgate-dev-books-392423995152
    adminEmail: admin@bookgate.com
    adminFullName: System Admin
chatService:
  image:
    repository: bookgate/chat-service
    tag: ef5eba4
    pullPolicy: Always
  replicas: 1
  port: 8001
  resources:
    requests:
      cpu: 125m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    corsOrigins: http://bookgate.canhnq.online
frontend:
  image:
    repository: bookgate/frontend
    tag: ef5eba4
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
externalSecrets:
  clusterSecretStoreName: aws-secretsmanager
  remoteSecretName: bookgate/dev/app-secrets
  refreshInterval: 1h
existingSecret: bookgate-secret
prometheusRule:
  enabled: true
  memoryThreshold: '0.85'
  cpuUsageThreshold: '0.80'
  cpuThrottlingThreshold: '0.20'
ingress:
