# values.yaml — production defaults for EKS deployment.

# ── Image registry (ECR) ─────────────────────────────────────────────────────
# Populated by Terraform output: ecr_registry_url
ecr:
  registry: "ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com"

# ── Service images — update tags manually on each release ────────────────────
apiService:
  image:
    repository: bookgate/api-service
    tag: "SET_IMAGE_TAG"
    pullPolicy: Always
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    corsOrigins: "https://bookgate.example.com"
    awsDefaultRegion: "ap-southeast-1"
    s3BucketName: "SET_S3_BUCKET_NAME"  # Terraform output: s3_bucket_name
    adminEmail: "admin@bookgate.com"
    adminFullName: "System Admin"

chatService:
  image:
    repository: bookgate/chat-service
    tag: "SET_IMAGE_TAG"
    pullPolicy: Always
  replicas: 1
  port: 8001
  resources:
    requests:
      cpu: 125m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    corsOrigins: "https://bookgate.example.com"

frontend:
  image:
    repository: bookgate/frontend
    tag: "SET_IMAGE_TAG"
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Secrets — External Secrets Operator ──────────────────────────────────────
# ESO watches the ExternalSecret object and syncs a K8s Secret from AWS
# Secrets Manager automatically. No manual kubectl steps needed.
#
# Prerequisites (done once at cluster level, not by this chart):
#   1. ESO installed: helm install eso external-secrets/external-secrets
#   2. ClusterSecretStore created and pointing to AWS SM via IRSA
#
# The K8s Secret produced by ESO must contain:
#   DATABASE_URL, SECRET_KEY, ADMIN_PASSWORD, OPENAI_API_KEY
externalSecrets:
  # Name of the ClusterSecretStore pre-configured at cluster level.
  clusterSecretStoreName: "aws-secretsmanager"
  # AWS Secrets Manager secret name. Terraform creates this.
  remoteSecretName: "bookgate/prod"
  # How often ESO re-syncs from SM.
  refreshInterval: "1h"

# Name of the K8s Secret that ESO creates. Deployments reference this.
existingSecret: "bookgate-secret"

# ── Database migration Job ────────────────────────────────────────────────────
migrate:
  image:
    repository: bookgate/api-service
    tag: "SET_IMAGE_TAG"
    pullPolicy: Always

# ── Ingress (AWS Load Balancer Controller) ────────────────────────────────────
ingress:
  host: "bookgate.example.com"
  scheme: "internet-facing"
  idleTimeoutSeconds: 300
  certificateArn: ""
  groupName: "bookgate"
