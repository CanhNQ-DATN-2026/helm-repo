apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bookgate.name" . }}-migrate-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # Run before any Deployment is updated; block the upgrade if it fails.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "bookgate.image" (dict "registry" .Values.ecr.registry "repo" .Values.migrate.image.repository "tag" .Values.migrate.image.tag) }}
          imagePullPolicy: {{ .Values.migrate.image.pullPolicy }}
          command: ["bash", "scripts/migrate.sh"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: SECRET_KEY
            - name: ADMIN_EMAIL
              value: {{ .Values.apiService.env.adminEmail }}
            - name: ADMIN_FULL_NAME
              value: {{ .Values.apiService.env.adminFullName }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: ADMIN_PASSWORD
            - name: S3_BUCKET_NAME
              value: {{ .Values.apiService.env.s3BucketName }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.apiService.env.awsDefaultRegion }}
