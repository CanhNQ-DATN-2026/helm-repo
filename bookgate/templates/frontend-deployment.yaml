apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bookgate.name" . }}-frontend
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ include "bookgate.name" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "bookgate.name" . }}-frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "bookgate.image" (dict "registry" .Values.ecr.registry "repo" .Values.frontend.image.repository "tag" .Values.frontend.image.tag) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
