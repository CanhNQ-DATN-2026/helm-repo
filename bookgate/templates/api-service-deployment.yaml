apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bookgate.name" . }}-api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.apiService.replicas }}
  selector:
    matchLabels:
      app: {{ include "bookgate.name" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "bookgate.name" . }}-api
    spec:
      containers:
        - name: api-service
          image: {{ include "bookgate.image" (dict "registry" .Values.ecr.registry "repo" .Values.apiService.image.repository "tag" .Values.apiService.image.tag) }}
          imagePullPolicy: {{ .Values.apiService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.apiService.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: SECRET_KEY
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: ADMIN_PASSWORD
            - name: S3_BUCKET_NAME
              value: {{ .Values.apiService.env.s3BucketName }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.apiService.env.awsDefaultRegion }}
            - name: ADMIN_EMAIL
              value: {{ .Values.apiService.env.adminEmail }}
            - name: ADMIN_FULL_NAME
              value: {{ .Values.apiService.env.adminFullName }}
            - name: CORS_ORIGINS
              value: {{ .Values.apiService.env.corsOrigins }}
          resources:
            {{- toYaml .Values.apiService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiService.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
