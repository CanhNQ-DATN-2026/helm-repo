apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.apiService.serviceAccount.name }}
  namespace: {{ include "bookgate.namespace" . }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.apiService.serviceAccount.roleArn | quote }}
{{- if .Values.externalDns.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.externalDns.serviceAccount.name }}
  namespace: {{ include "bookgate.namespace" . }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.externalDns.serviceAccount.roleArn | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "bookgate.name" . }}-external-dns
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "bookgate.name" . }}-external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "bookgate.name" . }}-external-dns
subjects:
  - kind: ServiceAccount
    name: {{ .Values.externalDns.serviceAccount.name }}
    namespace: {{ include "bookgate.namespace" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bookgate.name" . }}-external-dns
  namespace: {{ include "bookgate.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bookgate.name" . }}-external-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bookgate.name" . }}-external-dns
    spec:
      serviceAccountName: {{ .Values.externalDns.serviceAccount.name }}
      containers:
        - name: external-dns
          image: "{{ .Values.externalDns.image.repository }}:{{ .Values.externalDns.image.tag }}"
          imagePullPolicy: {{ .Values.externalDns.image.pullPolicy }}
          args:
            - --source=ingress
            - --provider={{ .Values.externalDns.provider }}
            - --policy={{ .Values.externalDns.policy }}
            - --registry=txt
            - --txt-owner-id={{ .Values.externalDns.txtOwnerId }}
            - --ingress-class=alb
          {{- range .Values.externalDns.domainFilters }}
            - --domain-filter={{ . }}
          {{- end }}
          resources:
{{ toYaml .Values.externalDns.resources | indent 12 }}
{{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "bookgate.name" . }}-secret
  namespace: {{ include "bookgate.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.existingSecret }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretName }}
        property: DATABASE_URL
    - secretKey: SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretName }}
        property: SECRET_KEY
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretName }}
        property: ADMIN_PASSWORD
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.remoteSecretName }}
        property: OPENAI_API_KEY
