apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bookgate.name" . }}-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # AWS Load Balancer Controller
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName }}
    {{- if .Values.ingress.host }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.dnsHost | default .Values.ingress.host | quote }}
    {{- end }}

    # Idle timeout — must exceed the longest expected SSE stream duration
    alb.ingress.kubernetes.io/load-balancer-attributes: >-
      idle_timeout.timeout_seconds={{ .Values.ingress.idleTimeoutSeconds }}

    # Health check paths per target group
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: "200"

    {{- if .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    {{- else }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    {{- end }}

spec:
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          # Chat service — must be before /api/v1 (more specific prefix first)
          - path: /api/v1/chat
            pathType: Prefix
            backend:
              service:
                name: {{ include "bookgate.name" . }}-chat-service
                port:
                  number: {{ .Values.chatService.port }}

          # API service
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "bookgate.name" . }}-api-service
                port:
                  number: {{ .Values.apiService.port }}

          # Frontend — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "bookgate.name" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
