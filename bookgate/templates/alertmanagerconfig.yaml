{{- if and .Values.prometheusRule.enabled .Values.telegram.chatId }}
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: {{ include "bookgate.name" . }}-telegram
  namespace: {{ include "bookgate.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "bookgate.name" . }}
spec:
  route:
    receiver: telegram-and-webhook
    groupBy: ['alertname', 'namespace']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h
    continue: false
  receivers:
    - name: telegram-and-webhook
      telegramConfigs:
        - botToken:
            name: {{ .Values.existingSecret }}
            key: telegram_bot_token
          chatID: {{ .Values.telegram.chatId }}
          parseMode: Markdown
          sendResolved: false
          message: |-
            🚨 *{{ "{{" }} .GroupLabels.alertname {{ "}}" }}*
            Severity: {{ "{{" }} .CommonLabels.severity {{ "}}" }}
            {{ "{{" }} range .Alerts {{ "}}" }}• {{ "{{" }} .Annotations.summary {{ "}}" }}
            {{ "{{" }} end {{ "}}" }}
      webhookConfigs:
        - url: 'http://aiops-bot.{{ include "bookgate.namespace" . }}.svc:8080/webhook/alertmanager'
          sendResolved: false
{{- end }}
