apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-bot-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/CanhNQ-DATN-2026/helm-repo.git
    targetRevision: main
    path: aiops-bot
    helm:
      releaseName: aiops-bot
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aiops-bot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
